services:
  - type: web
    name: zenkoo-bot-api
    env: docker
    dockerContext: ./bot-service
    dockerfilePath: ./bot-service/Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: APPS_SCRIPT_MEMORY_URL
        sync: false
      - key: APPS_SCRIPT_MEMORY_ENABLED
        value: "true"
      - key: GOOGLE_SHEETS_MEMORY_ENABLED
        value: "false"
