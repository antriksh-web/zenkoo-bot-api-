<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenkoo Bot Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:,">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .chat-container { height: calc(100vh - 180px); }
        .typing-indicator span {
            display: inline-block;
            width: 4px;
            height: 4px;
            background-color: #94a3b8;
            border-radius: 50%;
            margin-right: 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">

<div id="app" class="flex flex-col h-screen max-w-4xl mx-auto border-x border-slate-200 bg-white">
    <header class="p-4 border-b border-slate-200 flex justify-between items-center glass sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold">Z</div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Zenkoo Bot</h1>
                <div class="flex items-center gap-1.5">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-400"></span>
                    <span id="status-text" class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Offline</span>
                </div>
            </div>
        </div>
        <button onclick="toggleSettings()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
    </header>

    <div id="settings-panel" class="hidden absolute inset-x-0 top-0 bg-white z-20 border-b border-slate-200 p-6 shadow-xl">
        <h2 class="text-xl font-bold mb-4">API Configuration</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Base URL</label>
                <input type="text" id="api-url" value="http://127.0.0.1:8000" class="w-full p-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" id="api-username" value="Human" class="w-full p-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Room ID</label>
                <input type="text" id="api-room" value="gaming" class="w-full p-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div class="flex items-end">
                <button onclick="saveSettings()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700 transition-colors">Apply Changes</button>
            </div>
        </div>
    </div>

    <main id="chat-window" class="chat-container overflow-y-auto p-4 flex flex-col gap-4 scrollbar-hide">
        <div class="text-center py-10 opacity-50 flex flex-col items-center">
            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
            </div>
            <p>Welcome to Zenkoo Bot Chat</p>
            <p class="text-xs">Configure your API in settings to start chatting</p>
        </div>
    </main>

    <div id="typing-box" class="hidden px-6 py-2">
        <div class="flex items-center gap-2 text-slate-400 text-sm">
            <span id="typing-bot-name" class="font-medium italic">Bot</span>
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <footer class="p-4 bg-white border-t border-slate-200 pb-8">
        <form id="chat-form" class="flex flex-col gap-2">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" id="user-input" placeholder="Type a message..." class="w-full px-4 py-3 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" autocomplete="off">
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                    <button type="button" onclick="document.getElementById('file-input').click()" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-indigo-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </button>
                </div>
                <button type="submit" id="send-btn" class="bg-indigo-600 text-white p-3 rounded-2xl hover:bg-indigo-700 disabled:opacity-50 transition-all flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
            <div id="image-preview-container" class="hidden relative inline-block">
                <img id="image-preview" src="" class="h-16 w-16 object-cover rounded-lg border border-slate-200">
                <button type="button" onclick="clearImage()" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
            <input type="text" id="image-url-input" placeholder="Or paste Image URL..." class="px-4 py-2 bg-slate-50 text-[10px] border border-slate-100 rounded-xl focus:ring-1 focus:ring-indigo-300 outline-none transition-all">
        </form>
    </footer>
</div>

<script>
    const state = {
        baseUrl: window.location.origin === 'null' || window.location.origin.includes('127.0.0.1') || window.location.origin.includes('localhost') 
            ? 'http://127.0.0.1:8000' 
            : window.location.origin,
        username: 'Human',
        roomId: 'gaming',
        isTyping: false,
        processedMessageIds: new Set()
    };

    const chatWindow = document.getElementById('chat-window');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const typingBox = document.getElementById('typing-box');
    const typingBotName = document.getElementById('typing-bot-name');

    function toggleSettings() {
        document.getElementById('settings-panel').classList.toggle('hidden');
    }

    function saveSettings() {
        state.baseUrl = document.getElementById('api-url').value.trim();
        state.username = document.getElementById('api-username').value.trim() || 'Human';
        state.roomId = document.getElementById('api-room').value.trim() || 'gaming';
        toggleSettings();
        checkHealth();
    }

    async function checkHealth() {
        try {
            const res = await fetch(`${state.baseUrl}/health`);
            if (!res.ok) throw new Error('Health not ok');
            statusDot.className = 'w-2 h-2 rounded-full bg-emerald-500';
            statusText.innerText = 'Online';
        } catch (_e) {
            statusDot.className = 'w-2 h-2 rounded-full bg-red-500';
            statusText.innerText = 'Server Error';
        }
    }

    function appendMessage(sender, text, isBot = false, imageUrl = null) {
        const wrapper = document.createElement('div');
        wrapper.className = `flex w-full mb-4 ${isBot ? 'justify-start' : 'justify-end'}`;
        
        let imageHtml = '';
        if (imageUrl) {
            imageHtml = `<img src="${imageUrl}" class="rounded-lg mb-2 max-h-48 object-cover w-full shadow-sm" onerror="this.style.display='none'">`;
        }

        wrapper.innerHTML = `
            <div class="max-w-[80%] ${isBot ? 'bg-slate-100 text-slate-800' : 'bg-indigo-600 text-white'} rounded-2xl px-4 py-3 shadow-sm">
                <div class="text-[10px] uppercase font-bold tracking-tighter mb-1 ${isBot ? 'text-slate-500' : 'text-indigo-200'}">${sender}</div>
                ${imageHtml}
                <div class="text-sm leading-relaxed">${String(text).replace(/\n/g, '<br>')}</div>
            </div>
        `;
        chatWindow.appendChild(wrapper);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    const imageInput = document.getElementById('image-url-input');
    const fileInput = document.getElementById('file-input');
    const imagePreview = document.getElementById('image-preview');
    const previewContainer = document.getElementById('image-preview-container');
    let base64Image = null;

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            base64Image = ev.target.result;
            imagePreview.src = base64Image;
            previewContainer.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    });

    function clearImage() {
        base64Image = null;
        fileInput.value = '';
        previewContainer.classList.add('hidden');
    }

    async function sendMessage(e) {
        e.preventDefault();
        const msg = userInput.value.trim();
        const urlImg = imageInput.value.trim();
        const img = base64Image || urlImg;

        if (!msg && !img) return;
        if (state.isTyping) return;

        userInput.value = '';
        imageInput.value = '';
        clearImage();
        
        appendMessage(state.username, msg, false, img);

        state.isTyping = true;
        sendBtn.disabled = true;

        try {
            const response = await fetch(`${state.baseUrl}/generate-reply`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    room_id: state.roomId,
                    username: state.username,
                    message: msg || "[sent an image]",
                    image_url: img || null
                })
            });

            if (!response.ok) throw new Error(`API failed with ${response.status}`);

            const data = await response.json();

            if (!data.will_send) {
                return;
            }

            if (data.typing_delay && data.typing_delay > 0) {
                typingBotName.innerText = data.bot || 'bot';
                typingBox.classList.remove('hidden');
                chatWindow.scrollTop = chatWindow.scrollHeight;
                // We'll let the pollMessages pick up the actual reply when it's "sent"
            }
        } catch (err) {
            console.error(err);
            typingBox.classList.add('hidden');
            appendMessage('System', 'Failed to reach bot service. Ensure API is running at the configured Base URL.', true);
        } finally {
            state.isTyping = false;
            sendBtn.disabled = false;
        }
    }

    async function pollMessages() {
        try {
            // Fetch sent messages
            const resp = await fetch(`${state.baseUrl}/scheduler/sent`);
            if (!resp.ok) return;
            const data = await resp.json();
            let newMessages = false;

            data.sent.forEach(msg => {
                if (msg.room_id === state.roomId && !state.processedMessageIds.has(msg.id)) {
                    state.processedMessageIds.add(msg.id);
                    appendMessage(msg.bot, msg.reply, true);
                    newMessages = true;
                }
            });

            // Fetch typing status
            const typingResp = await fetch(`${state.baseUrl}/scheduler/typing/${state.roomId}`);
            if (typingResp.ok) {
                const typingData = await typingResp.json();
                if (typingData.typing && typingData.typing.length > 0) {
                    typingBotName.innerText = typingData.typing.join(', ');
                    typingBox.classList.remove('hidden');
                } else {
                    typingBox.classList.add('hidden');
                }
            }

            if (newMessages) {
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        } catch (err) {
            console.error('Polling error:', err);
        }
    }

    chatForm.addEventListener('submit', sendMessage);
    window.addEventListener('resize', () => {
        chatWindow.scrollTop = chatWindow.scrollHeight;
    });

    checkHealth();
    setInterval(pollMessages, 1000);
</script>
</body>
</html>
